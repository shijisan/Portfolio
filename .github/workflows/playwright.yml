name: Playwright Tests
on:
  deployment_status:
    types: [success]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    if: github.event.deployment_status.state == 'success'
    steps:
    - uses: actions/checkout@v4
    - name: Run Screenshot API
      run: |
        curl -X GET "https://shijisan-portfolio.vercel.app/api/vercel/projects" -H "Content-Type: application/json"
